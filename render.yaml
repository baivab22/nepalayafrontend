services:
  - type: web
    name: nepalaya-api
    runtime: node
    rootDir: server
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.cjs
    healthCheckPath: /health
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: UPLOAD_DIR
        value: /opt/render/project/src
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: nepalaya
      - key: FRONTEND_URL
        value: "*"
      - key: ADMIN_PASSWORD
        sync: false
      - key: CONTACT_TO_EMAIL
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
