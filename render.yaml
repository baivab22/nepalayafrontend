services:
  - type: web
    name: college-nepal
    runtime: node
    buildCommand: >
      pnpm install --frozen-lockfile &&
      PORT=3000 BASE_PATH=/ pnpm --filter @workspace/college-website run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
