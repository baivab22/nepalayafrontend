services:
  - type: web
    name: college-nepal
    runtime: node
    buildCommand: >
      npm install --prefix client &&
      npm install --prefix server &&
      npm run build --prefix client &&
      npm run build --prefix server
    startCommand: npm run start --prefix server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
