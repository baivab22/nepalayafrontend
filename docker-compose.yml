version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: nepalaya-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: nepalaya
    volumes:
      - mongodb_data:/data/db
    networks:
      - nepalaya-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nepalaya-api
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      PORT: 8000
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB_NAME: nepalaya
      FRONTEND_URL: http://localhost:3000
      ADMIN_PASSWORD: admin@nepalaya2025
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./server/uploads:/app/dist/uploads
    networks:
      - nepalaya-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  nepalaya-network:
    driver: bridge
